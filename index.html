<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <!-- Primary Meta Tags -->
    <title>Linkaura | All Your Important Links in One Place</title>
    <meta name="title" content="Linkaura | Your Personal Link Hub" />
    <meta name="description" content="Linkaura helps you organize, manage, and share your digital presence with a single, beautiful link. Perfect for creators, influencers, and businesses." />
    <meta name="keywords" content="link in bio, link management, digital business card, social media links, Linkaura, creator tools, portfolio, bio link, link tree alternative" />
    <meta name="author" content="Linkaura" />
    <meta name="generator" content="Linkaura" />
    
    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="g6DKn6Nzdcj_m3xo8I54oWQ2ARW0TIzp-gq89GlLEOA" />

    <!-- Theme and Icons -->
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json?v=2" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://linkaura.in/" />
    <meta property="og:title" content="Linkaura | Your Personal Link Hub" />
    <meta property="og:description" content="Simplify your online presence. One link to rule them all. Build your digital portfolio and share your creations seamlessly." />
    <meta property="og:image" content="https://linkaura.in/og-image.png" />
    <meta property="og:site_name" content="Linkaura" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://linkaura.in/" />
    <meta property="twitter:title" content="Linkaura | Your Personal Link Hub" />
    <meta property="twitter:description" content="Simplify your online presence. One link to rule them all." />
    <meta property="twitter:image" content="https://linkaura.in/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://linkaura.in/" />

    <!-- Google Places autocomplete dark theme -->
    <style>
      .pac-container {
        background: #0f0f0f;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 14px;
        margin-top: 6px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        font-family: inherit;
        overflow: hidden;
      }
      .pac-item {
        background: transparent;
        color: rgba(255,255,255,0.6);
        border-top: 1px solid rgba(255,255,255,0.05);
        padding: 10px 14px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.15s;
      }
      .pac-item:first-child { border-top: none; }
      .pac-item:hover, .pac-item-selected {
        background: rgba(245,158,11,0.08);
        color: #f59e0b;
      }
      .pac-item-query {
        color: #f59e0b;
        font-size: 12px;
        font-weight: 700;
      }
      .pac-icon { display: none; }
      .pac-logo::after { display: none; }
    </style>

    <!-- Structured JSON-LD Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Linkaura",
      "url": "https://linkaura.in/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://linkaura.in/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <h1>Linkaura</h1>
      <p>Linkaura is the ultimate tool to manage your social links and digital presence. Please enable JavaScript to view the full experience.</p>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
